# Development environment compose file
# Usage: docker compose -f docker-compose.dev.yml up -d

version: '3.4'

services:
  postgres:
    image: postgres:15
    container_name: new-api-dev-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: new_api_dev
    ports:
      - "5432:5432"
    volumes:
      - pg_dev_data:/var/lib/postgresql/data
    networks:
      - dev-network

  redis:
    image: redis:7-alpine
    container_name: new-api-dev-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - dev-network

volumes:
  pg_dev_data:

networks:
  dev-network:
    driver: bridge
