name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  NODE_VERSION: "20"

jobs:
  lint-frontend:
    name: Lint & Build (Frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-src/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web-src/web/package-lock.json

      - run: npm ci --legacy-peer-deps

      - run: CI=false npm run build

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: lint-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: litenova999:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
