run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gosimple
    - gocritic
    - misspell
    - gofmt
    - goimports
  disable:
    - depguard

linters-settings:
  gocritic:
    enabled-checks:
      - dupImport
      - ifElseChain
      - nestingReduce
  misspell:
    locale: US
  goimports:
    local-prefixes: github.com/QuantumNous/new-api

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
  exclude-dirs:
    - web
    - vendor
