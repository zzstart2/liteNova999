# PRJ-LITE999-T-018 — Nginx HTTPS Configuration Template
# Replace YOUR_DOMAIN with your actual domain before deploying.
# Deploy to: /opt/new-api/config/nginx-ssl.conf → mount as nginx.conf

# Rate limiting
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

upstream new_api_backend {
    server new-api:3000;
    keepalive 32;
}

# === HTTP → HTTPS Redirect ===
server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# === HTTPS Server ===
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # --- TLS Certificates ---
    ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # --- TLS Configuration (Modern) ---
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # --- OCSP Stapling ---
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # --- Security Headers ---
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss: https:; font-src 'self' data:; frame-src 'self' https:;" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Hide server info
    server_tokens off;
    proxy_hide_header X-Powered-By;

    # Upload size
    client_max_body_size 50m;

    # --- Health Check (no rate limit) ---
    location = /api/status {
        proxy_pass http://new_api_backend;
        proxy_set_header Host $host;
    }

    # --- Monitoring stub_status (internal only) ---
    location /nginx_status {
        stub_status;
        allow 172.16.0.0/12;
        allow 127.0.0.1;
        deny all;
        access_log off;
    }

    # --- API routes with rate limiting ---
    location /v1/ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://new_api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_http_version 1.1;

        # SSE streaming
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 2;
    }

    # --- Management API ---
    location /api/ {
        limit_req zone=api_limit burst=30 nodelay;

        proxy_pass http://new_api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    # --- WebSocket (realtime audio) ---
    location /v1/realtime {
        proxy_pass http://new_api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --- Frontend / catch-all ---
    location / {
        proxy_pass http://new_api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Static asset caching
        location ~* \.(js|css|png|jpg|ico|svg|woff2?)$ {
            proxy_pass http://new_api_backend;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable";
        }
    }
}
