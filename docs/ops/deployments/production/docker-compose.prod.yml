# New-API Production Docker Compose
# Usage:
#   1. cp .env.example .env && edit .env
#   2. docker compose -f docker-compose.prod.yml up -d

version: '3.8'

services:
  # ===== Application Node 1 (Master) =====
  new-api-master:
    image: ghcr.io/${REPO_OWNER}/new-api:${VERSION:-latest}
    container_name: new-api-master
    restart: always
    command: --log-dir /app/logs
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - master_data:/data
      - master_logs:/app/logs
    env_file: .env
    environment:
      - NODE_TYPE=master
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ===== Application Node 2 (Slave) =====
  new-api-slave:
    image: ghcr.io/${REPO_OWNER}/new-api:${VERSION:-latest}
    container_name: new-api-slave
    restart: always
    command: --log-dir /app/logs
    ports:
      - "127.0.0.1:3002:3000"
    volumes:
      - slave_data:/data
      - slave_logs:/app/logs
    env_file: .env
    environment:
      - NODE_TYPE=slave
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G

  # ===== PostgreSQL =====
  postgres:
    image: postgres:15-alpine
    container_name: new-api-pg
    restart: always
    environment:
      POSTGRES_USER: newapi
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: newapi
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newapi"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G

  # ===== Redis =====
  redis:
    image: redis:7-alpine
    container_name: new-api-redis
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  # ===== Nginx =====
  nginx:
    image: nginx:1.27-alpine
    container_name: new-api-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/letsencrypt:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      new-api-master:
        condition: service_healthy
    networks:
      - backend

volumes:
  pg_data:
  redis_data:
  master_data:
  master_logs:
  slave_data:
  slave_logs:
  nginx_logs:

networks:
  backend:
    driver: bridge
