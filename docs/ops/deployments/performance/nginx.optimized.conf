# Nginx Configuration - PRJ-LITE999-T-019 Performance Optimized
# Generated: 2026-04-13
# Target: 2C/3.5GB single-node deployment

# ===== Worker 进程优化 =====
worker_processes 2;                 # CPU 核心数
worker_connections 2048;            # 每个 worker 连接数 (从默认1024提升)
worker_rlimit_nofile 8192;          # 文件句柄限制

# ===== 事件模型优化 =====
events {
    use epoll;                      # Linux 高效事件模型
    multi_accept on;                # 一次接受多个连接
    worker_connections 2048;
}

http {
    # ===== 基础优化 =====
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    sendfile on;                    # 零拷贝文件传输
    tcp_nopush on;                  # 批量发送
    tcp_nodelay on;                 # 禁用 Nagle 算法
    
    # ===== Keepalive 优化 =====
    keepalive_timeout 65;
    keepalive_requests 1000;        # 每个连接最大请求数
    
    # ===== 缓冲区优化 =====
    client_body_buffer_size 128k;
    client_max_body_size 50m;       # 上传大小限制
    client_body_timeout 60s;
    client_header_timeout 60s;
    
    # Proxy 缓冲区
    proxy_buffering on;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
    proxy_temp_file_write_size 256k;
    
    # ===== Gzip 压缩 =====
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ===== 连接限流 =====
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    # ===== Upstream 连接池优化 =====
    upstream new_api_backend {
        server new-api:3000;
        keepalive 16;               # 从 32 降低 (节省内存)
        keepalive_requests 1000;
        keepalive_timeout 60s;
    }

    server {
        listen 80;
        server_name _;

        # ===== Security Headers =====
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        server_tokens off;          # 隐藏 Nginx 版本

        # ===== Monitoring =====
        location = /nginx_status {
            stub_status;
            allow 172.16.0.0/12;
            allow 127.0.0.1;
            deny all;
            access_log off;
        }

        # ===== Health Check =====
        location = /api/status {
            proxy_pass http://new_api_backend;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_http_version 1.1;
        }

        # ===== API Routes (with rate limiting) =====
        location /v1/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://new_api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_http_version 1.1;

            # SSE/Streaming 优化
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 180s;    # 与 STREAMING_TIMEOUT 匹配
            proxy_send_timeout 180s;

            # 重试优化
            proxy_next_upstream error timeout http_502 http_503;
            proxy_next_upstream_tries 2;
        }

        location /api/ {
            limit_req zone=api_limit burst=30 nodelay;

            proxy_pass http://new_api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_http_version 1.1;
        }

        # ===== WebSocket =====
        location /v1/realtime {
            proxy_pass http://new_api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ===== Frontend / Static Assets =====
        location / {
            proxy_pass http://new_api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_http_version 1.1;

            # 静态资源缓存优化
            location ~* \.(js|css|png|jpg|ico|svg|woff2?)$ {
                proxy_pass http://new_api_backend;
                expires 30d;
                add_header Cache-Control "public, max-age=2592000, immutable";
            }
        }
    }
}