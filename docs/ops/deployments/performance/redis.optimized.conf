# Redis Configuration - PRJ-LITE999-T-019 Performance Optimized
# Generated: 2026-04-13
# Target: 2C/3.5GB single-node deployment

# ===== 内存优化 =====
maxmemory 320mb                     # 从 256MB 增加到 320MB
maxmemory-policy allkeys-lru        # LRU 淘汰策略

# ===== 数据结构优化 =====
hash-max-ziplist-entries 512        # 哈希表压缩优化
hash-max-ziplist-value 64
list-max-ziplist-size -2
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# ===== 持久化优化 (性能优先) =====
save 900 1                          # 15分钟内至少1个key变化
save 300 10                         # 5分钟内至少10个key变化  
save 60 100                         # 1分钟内至少100个key变化 (从10000降低)

# AOF 配置 (保持)
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite yes       # 新增：重写期间不fsync

# ===== 网络优化 =====
tcp-keepalive 300                   # TCP keepalive
timeout 300                         # 客户端空闲超时 (5分钟)
maxclients 8000                     # 从 10000 降低到 8000

# ===== 慢日志 =====
slowlog-log-slower-than 10000       # 记录 >10ms 的慢命令
slowlog-max-len 128

# ===== 其他优化 =====
tcp-backlog 511                     # TCP 监听队列
databases 16                        # 默认数据库数