# PostgreSQL Configuration - PRJ-LITE999-T-019 Performance Optimized
# Generated: 2026-04-13
# Target: 2C/3.5GB single-node deployment

# ===== 内存设置 (针对 3.5GB 系统优化) =====
shared_buffers = 256MB          # 从 128MB 提升 (7% RAM)
effective_cache_size = 1GB      # 从 384MB 提升 (28% RAM)
work_mem = 8MB                  # 从 4MB 提升 (排序/连接优化)
maintenance_work_mem = 128MB    # 从 64MB 提升 (VACUUM/CREATE INDEX)

# ===== 连接与并发优化 =====
max_connections = 60            # 从 100 降低 (减少内存开销)
max_prepared_transactions = 10  # 新增 (支持分布式事务)

# ===== WAL 与检查点优化 =====
checkpoint_completion_target = 0.9  # 平滑检查点写入
wal_buffers = 16MB                  # WAL 缓冲区
max_wal_size = 1GB                  # 最大 WAL 大小
min_wal_size = 256MB                # 最小 WAL 大小

# ===== 查询规划器优化 =====
random_page_cost = 1.1              # SSD 优化 (默认 4.0)
effective_io_concurrency = 200      # SSD 并发 I/O
default_statistics_target = 100     # 统计采样

# ===== 日志与监控 =====
log_connections = on
log_disconnections = on
log_min_duration_statement = 1000   # 记录 >1s 的慢查询
track_activities = on
track_counts = on
track_io_timing = on                # I/O 时间统计

# ===== 自动清理优化 =====
autovacuum = on
autovacuum_max_workers = 2          # 从默认 3 降低
autovacuum_naptime = 60s            # 清理间隔

# ===== SSL (保持原配置) =====
# ssl = off  # 内网 Docker 可接受