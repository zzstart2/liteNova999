# PRJ-LITE999-T-017 — Prometheus Configuration
# Optimized for 2C/3.5G single-node deployment

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  # --- Prometheus self-monitoring ---
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 30s

  # --- Host metrics (node_exporter) ---
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 30s

  # --- New-API health probe (blackbox-style via /api/status) ---
  - job_name: 'new-api'
    metrics_path: /api/status
    static_configs:
      - targets: ['new-api:3000']
    scrape_interval: 15s
    # We don't get Prometheus metrics from /api/status,
    # but probe_success is synthesized by relabeling below.
    # For real probing, we use the up metric.

  # --- PostgreSQL ---
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 15s

  # --- Redis ---
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 15s

  # --- Nginx stub_status ---
  - job_name: 'nginx'
    metrics_path: /nginx_status
    static_configs:
      - targets: ['new-api-nginx:80']
    scrape_interval: 15s
