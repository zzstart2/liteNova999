# Grafana auto-provisioned dashboard provider
apiVersion: 1

providers:
  - name: 'default'
    orgId: 1
    folder: 'PRJ-LITE999'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
