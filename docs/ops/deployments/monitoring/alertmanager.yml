# PRJ-LITE999-T-017 — Alertmanager Configuration
#
# ⚠️  IMPORTANT: Configure at least one receiver before deploying!
# Options: webhook (Discord/Slack/Telegram bot), email, PagerDuty

global:
  resolve_timeout: 5m
  # smtp_smarthost: 'smtp.example.com:587'
  # smtp_from: 'alertmanager@example.com'
  # smtp_auth_username: 'alertmanager@example.com'
  # smtp_auth_password: 'xxx'

route:
  receiver: 'default'
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    # Critical alerts — immediate
    - match:
        severity: critical
      receiver: 'critical'
      group_wait: 10s
      repeat_interval: 1h

    # Warning alerts — batched
    - match:
        severity: warning
      receiver: 'default'
      group_wait: 1m
      repeat_interval: 4h

    # Info — log only, no notification
    - match:
        severity: info
      receiver: 'null'

receivers:
  - name: 'default'
    # Uncomment and configure one:
    # webhook_configs:
    #   - url: 'https://discord.com/api/webhooks/xxx/yyy'
    #     send_resolved: true
    # email_configs:
    #   - to: 'admin@example.com'
    #     send_resolved: true

  - name: 'critical'
    # Same as default but can add extra channels (SMS, PagerDuty)
    # webhook_configs:
    #   - url: 'https://discord.com/api/webhooks/xxx/yyy'
    #     send_resolved: true

  - name: 'null'
    # Intentionally empty — swallows info alerts

inhibit_rules:
  # If critical is firing, suppress warning for same alertname
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname']
