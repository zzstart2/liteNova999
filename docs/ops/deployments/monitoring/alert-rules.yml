# PRJ-LITE999-T-017 — Alert Rules

groups:
  # ===== Critical — Immediate notification =====
  - name: critical
    rules:
      - alert: NewApiDown
        expr: up{job="new-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "New-API is DOWN"
          description: "New-API health check has been failing for {{ $labels.instance }} for more than 1 minute."

      - alert: PostgresDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is DOWN"
          description: "PostgreSQL exporter reports the database is unreachable."

      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is DOWN"
          description: "Redis exporter reports the server is unreachable."

      - alert: DiskSpaceCritical
        expr: (node_filesystem_avail_bytes{mountpoint="/",fstype!="tmpfs"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Disk space critically low (<10%)"
          description: "Root filesystem has only {{ $value | humanizePercentage }} available."

      - alert: MemoryCritical
        expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) < 0.10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Memory critically low (<10% available)"
          description: "Only {{ $value | humanizePercentage }} of memory available."

  # ===== Warning — Delayed notification =====
  - name: warning
    rules:
      - alert: HighCPULoad
        expr: node_load1 > 4
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU load (load1 > 4 on 2-core)"
          description: "1-minute load average is {{ $value }}."

      - alert: DiskSpaceWarning
        expr: (node_filesystem_avail_bytes{mountpoint="/",fstype!="tmpfs"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.20
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Disk space low (<20%)"
          description: "Root filesystem has {{ $value | humanizePercentage }} available."

      - alert: MemoryWarning
        expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) < 0.20
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Memory low (<20% available)"
          description: "{{ $value | humanizePercentage }} of memory available."

      - alert: PGConnectionsHigh
        expr: sum(pg_stat_activity_count) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connections high (>80/100)"
          description: "{{ $value }} active connections."

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage >80%"
          description: "Redis is using {{ $value | humanizePercentage }} of max memory."

      - alert: HighNginxConnections
        expr: nginx_connections_active > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Nginx active connections high (>500)"
          description: "{{ $value }} active connections."

  # ===== Info — Log only =====
  - name: info
    rules:
      - alert: NewApiSlow
        expr: probe_duration_seconds{job="new-api"} > 2
        for: 5m
        labels:
          severity: info
        annotations:
          summary: "New-API health check slow (>2s)"
          description: "Health check response time is {{ $value }}s."
