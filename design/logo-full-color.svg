<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <!-- LITE999 Full Color Logo -->
  <!-- Icon: Abstract L-shape with Nova Blue gradient -->
  <defs>
    <linearGradient id="nova-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#667FFF"/>
      <stop offset="100%" stop-color="#3354FF"/>
    </linearGradient>
  </defs>
  <!-- Icon mark -->
  <rect x="4" y="4" width="10" height="36" rx="3" fill="url(#nova-grad)"/>
  <rect x="4" y="30" width="28" height="10" rx="3" fill="url(#nova-grad)"/>
  <!-- Dot accent -->
  <circle cx="36" cy="35" r="5" fill="#3354FF"/>
  <!-- Wordmark -->
  <text x="50" y="34" font-family="Inter, Source Han Sans SC, sans-serif" font-size="26" font-weight="700" fill="#212529" letter-spacing="-0.5">
    LITE<tspan fill="#3354FF">999</tspan>
  </text>
</svg>
