services:
  one-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: litenova999:latest
    container_name: one-api
    restart: always
    ports:
      - "3000:3000"
    environment:
      - SQL_DSN=postgres://oneapi:${POSTGRES_PASSWORD}@db:5432/oneapi?sslmode=disable
      - REDIS_CONN_STRING=redis://:${REDIS_PASSWORD}@redis:6379
      - SESSION_SECRET=${SESSION_SECRET}
      - TZ=Asia/Shanghai
      - INITIAL_ROOT_TOKEN=sk-admin-qwen-proxy-2026
      - MEMORY_CACHE_ENABLED=true
      - SYNC_FREQUENCY=60
      - ENABLE_METRIC=true
      - METRIC_QUEUE_SIZE=10
      - METRIC_SUCCESS_RATE_THRESHOLD=0.8
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - one-api-data:/data

  db:
    image: postgres:14-alpine
    container_name: one-api-db
    restart: always
    environment:
      - POSTGRES_USER=oneapi
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=oneapi
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oneapi"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: one-api-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  one-api-data:
  postgres-data:
  redis-data:
